<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>ビット反転画像ビューアー</title>
        <style>
img {
    width: 100%;
}
        </style>
    </head>
    <body>
        <div>
            ビット反転画像ファイル選択　<input type="file" id="file" multiple />
        </div>
        <br />
        <div>
            <button type="button" id="showBitFlippedImage">ビット反転画像表示</button>
        </div>
        <br />
        <p id="message"></p>
        <br />
        <div id="images"></div>


        <script>


const $ = (id) => {
    return document.getElementById(id);
};


$("showBitFlippedImage").onclick = async () => {

    const files = $("file").files;

    if (files.length == 0) {
        $("message").innerHTML = "ビット反転画像ファイルを選択してください。";
        return;
    }

    $("message").innerHTML = "ビット反転画像ファイルを処理中です……。";

    $("images").innerHTML = "";

    for (let index = 0; index < files.length; index++) {

        const file = files[index];

        const arrayBuffer = await file.arrayBuffer();
        const size = arrayBuffer.byteLength;
        const dataView = new DataView(arrayBuffer);

        //ビット反転
        for (let byteIndex = 0; byteIndex < size; byteIndex++) {
            dataView.setUint8(byteIndex, (~ dataView.getUint8(byteIndex)) >>> 0, /* リトル エンディアン */ true);
        }

        const divElement = document.createElement("div");

        const imageElement = document.createElement("img");

        const fileName = file.name;
        if (fileName.match(/[^a-z]png[^a-z]/gi) != null) {
            imageElement.src = "data:image/png;base64," + new Uint8Array(arrayBuffer).toBase64();
        } else {
            imageElement.src = "data:image/jpeg;base64," + new Uint8Array(arrayBuffer).toBase64();
        }

        divElement.appendChild(imageElement);

        $("images").appendChild(divElement);
    }

    $("message").innerHTML = "";
};


        </script>
    </body>
</html>
